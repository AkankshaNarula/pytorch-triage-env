<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="720" viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="720" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">pytorch_triage_env — Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#888888">OpenEnv Hackathon 2026</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BOX: LLM Proxy -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="360" y="80" width="280" height="80" rx="10" fill="#1a2744" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b82f6">☁️ LLM Proxy</text>
  <text x="500" y="122" text-anchor="middle" font-size="11" fill="#93c5fd">router.huggingface.co/v1</text>
  <text x="500" y="138" text-anchor="middle" font-size="11" fill="#93c5fd">Qwen/Qwen2.5-72B-Instruct</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BOX: Inference Agent -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="30" y="200" width="260" height="220" rx="10" fill="#1a2a1a" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#22c55e">🤖 inference.py (Agent)</text>

  <!-- Steps inside agent box -->
  <rect x="50" y="238" width="220" height="28" rx="5" fill="#14231a" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="256" text-anchor="middle" font-size="11" fill="#86efac">1. make_llm_client()</text>

  <rect x="50" y="272" width="220" height="28" rx="5" fill="#14231a" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="290" text-anchor="middle" font-size="11" fill="#86efac">2. preflight_llm_test()</text>

  <rect x="50" y="306" width="220" height="28" rx="5" fill="#14231a" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="324" text-anchor="middle" font-size="11" fill="#86efac">3. warmup_env() — polls /health</text>

  <rect x="50" y="340" width="220" height="28" rx="5" fill="#14231a" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="358" text-anchor="middle" font-size="11" fill="#86efac">4. run_episode() loop</text>

  <rect x="50" y="374" width="220" height="28" rx="5" fill="#14231a" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="392" text-anchor="middle" font-size="11" fill="#86efac">5. get_action() via LLM</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BOX: FastAPI Server -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="370" y="200" width="260" height="220" rx="10" fill="#1a1a2e" stroke="#a855f7" stroke-width="2"/>
  <text x="500" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#a855f7">🖥️ FastAPI Server :7860</text>

  <rect x="388" y="238" width="224" height="22" rx="4" fill="#160d26" stroke="#7c3aed" stroke-width="1"/>
  <text x="500" y="253" text-anchor="middle" font-size="10" fill="#c4b5fd">POST /reset   POST /step</text>

  <rect x="388" y="265" width="224" height="22" rx="4" fill="#160d26" stroke="#7c3aed" stroke-width="1"/>
  <text x="500" y="280" text-anchor="middle" font-size="10" fill="#c4b5fd">GET /state   GET /health   GET /schema</text>

  <!-- environment.py -->
  <rect x="388" y="295" width="224" height="50" rx="5" fill="#1e1340" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="314" text-anchor="middle" font-size="11" font-weight="bold" fill="#ddd6fe">environment.py</text>
  <text x="500" y="332" text-anchor="middle" font-size="10" fill="#c4b5fd">PyTorchTriageEnv · reset() · step() · state</text>

  <!-- models.py -->
  <rect x="388" y="352" width="224" height="30" rx="5" fill="#1e1340" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="371" text-anchor="middle" font-size="10" fill="#c4b5fd">models.py — TriageAction discriminated union</text>

  <!-- app.py -->
  <rect x="388" y="389" width="224" height="22" rx="5" fill="#1e1340" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="403" text-anchor="middle" font-size="10" fill="#c4b5fd">app.py — FastAPI + triple-fallback imports</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BOX: Core Components (below server) -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="370" y="450" width="260" height="220" rx="10" fill="#1a1a1a" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">⚙️ Core Components</text>

  <rect x="388" y="485" width="224" height="42" rx="5" fill="#211a0d" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">virtual_fs.py</text>
  <text x="500" y="518" text-anchor="middle" font-size="10" fill="#fde68a">In-memory files · Git diff tracking</text>

  <rect x="388" y="533" width="224" height="42" rx="5" fill="#211a0d" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="550" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">mock_execution_engine.py</text>
  <text x="500" y="566" text-anchor="middle" font-size="10" fill="#fde68a">Authentic PyTorch traces · 4 task scenarios</text>

  <rect x="388" y="581" width="224" height="42" rx="5" fill="#211a0d" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="598" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">rubrics.py</text>
  <text x="500" y="614" text-anchor="middle" font-size="10" fill="#fde68a">TrajectoryRubric · LLMJudgeRubric</text>

  <rect x="388" y="629" width="224" height="32" rx="5" fill="#211a0d" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="649" text-anchor="middle" font-size="10" fill="#fde68a">Score: strictly (0.001, 0.999) open interval</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BOX: 4 Tasks -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="700" y="450" width="270" height="220" rx="10" fill="#1a1215" stroke="#ec4899" stroke-width="2"/>
  <text x="835" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#ec4899">📋 Debug Tasks</text>

  <rect x="716" y="485" width="238" height="38" rx="5" fill="#200d15" stroke="#be185d" stroke-width="1"/>
  <text x="835" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9a8d4">oom_graph_leak</text>
  <text x="835" y="515" text-anchor="middle" font-size="10" fill="#fbcfe8">Easy · 8 steps · loss.item() fix</text>

  <rect x="716" y="529" width="238" height="38" rx="5" fill="#200d15" stroke="#be185d" stroke-width="1"/>
  <text x="835" y="544" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9a8d4">fsdp_collective_deadlock</text>
  <text x="835" y="559" text-anchor="middle" font-size="10" fill="#fbcfe8">Medium · 9 steps · move all_reduce</text>

  <rect x="716" y="573" width="238" height="38" rx="5" fill="#200d15" stroke="#be185d" stroke-width="1"/>
  <text x="835" y="588" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9a8d4">compile_graph_break</text>
  <text x="835" y="603" text-anchor="middle" font-size="10" fill="#fbcfe8">Medium · 10 steps · @compiler.disable</text>

  <rect x="716" y="617" width="238" height="38" rx="5" fill="#200d15" stroke="#be185d" stroke-width="1"/>
  <text x="835" y="632" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9a8d4">ddp_gradient_hang</text>
  <text x="835" y="647" text-anchor="middle" font-size="10" fill="#fbcfe8">Hard · 9 steps · find_unused_parameters</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Agent → LLM proxy (API calls) -->
  <line x1="222" y1="200" x2="380" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
  <text x="270" y="155" font-size="10" fill="#93c5fd">API calls</text>

  <!-- LLM proxy → Agent (completions) -->
  <line x1="370" y1="150" x2="218" y2="210" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
  <text x="240" y="180" font-size="10" fill="#93c5fd">completions</text>

  <!-- Agent → Server (actions) -->
  <line x1="290" y1="310" x2="368" y2="310" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="298" y="303" font-size="10" fill="#c4b5fd">JSON action</text>

  <!-- Server → Agent (obs + reward) -->
  <line x1="370" y1="330" x2="292" y2="330" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="296" y="348" font-size="10" fill="#86efac">obs + reward</text>

  <!-- Server → Core Components -->
  <line x1="500" y1="420" x2="500" y2="448" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <!-- Core Components → Tasks -->
  <line x1="630" y1="560" x2="698" y2="560" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowPink)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="500" y="700" text-anchor="middle" font-size="11" fill="#555555">OpenEnv Hackathon 2026 · github.com/AkankshaNarula/pytorch-triage-env · huggingface.co/spaces/an8136/pytorch-triage-env</text>
</svg>
